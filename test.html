<style>
.overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s ease;
    z-index:999;
}
.overlay.show { opacity:1; pointer-events:auto; }

.overlay-content {
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    display:flex;
    gap:40px;
    max-width:700px;
    width:90%;
    color:white;
    position:relative;
    transform: scale(0.7);
    transition: transform 0.3s ease;
}
.overlay.show .overlay-content { transform: scale(1); }

.overlay-left img { width:120px; }

#close-overlay {
    position:absolute;
    top:10px;
    right:10px;
    cursor:pointer;
}
#overlay-socials a {
    display:block;
    margin-top:5px;
    color:#00acee;
}
</style>
</head>

<body>

<div id="team-container"></div>

<!-- Overlay -->
<div id="overlay" class="overlay">
    <div class="overlay-content">
        <button id="close-overlay">✖</button>

        <div class="overlay-left">
            <img id="overlay-skin">
            <h2 id="overlay-name"></h2>
            <p id="overlay-rank"></p>
        </div>

        <div class="overlay-right">

// === LOGIC ===
const container=document.getElementById("team-container");
const overlay=document.getElementById("overlay");
const overlayContent=overlay.querySelector(".overlay-content");

function openOverlay(member){
    document.getElementById("overlay-skin").src=member.skin||defaultSkin;
    document.getElementById("overlay-name").textContent=member.name;
    document.getElementById("overlay-rank").textContent=member.rank;
    document.getElementById("overlay-description").textContent=member.card.ldis;

    const socials=document.getElementById("overlay-socials");
    socials.innerHTML="";
    member.card.sm.forEach(s=>{
        const a=document.createElement("a");
        a.href=s[1]; a.textContent=s[0]; a.target="_blank";
        socials.appendChild(a);
    });

    overlay.classList.add("show");
}

function closeOverlay(){ overlay.classList.remove("show"); }

document.getElementById("close-overlay").onclick=closeOverlay;
overlay.onclick=(e)=>{ if(!overlayContent.contains(e.target)) closeOverlay(); };
document.onkeydown=(e)=>{ if(e.key==="Escape") closeOverlay(); };

// render
for(const [cat, members] of Object.entries(teamData)){
    const div=document.createElement("div");
    div.innerHTML=`<h2>${cat}</h2><ul></ul>`;
    const ul=div.querySelector("ul");

    members.forEach(m=>{
        const li=document.createElement("li");
        li.innerHTML=`<div class="dev-card">
            <img src="${m.skin||defaultSkin}">
            <h3>${m.name}</h3>
            <p>${m.rank}</p>
        </div>`;
        li.onclick=()=>openOverlay(m);
        ul.appendChild(li);
    });

    container.appendChild(div);
}
